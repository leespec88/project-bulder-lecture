<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <button id="theme-toggle" class="theme-toggle">다크 모드</button>
    <h1>로또 번호 생성기</h1>
    <div id="lotto-sets" class="lotto-sets">
        <!-- 번호가 여기에 생성됩니다 -->
    </div>
    <button onclick="generateLotto()">새로운 번호 생성</button>
</div>

<div class="container contact-section">
    <h2>제휴 문의</h2>
    <form action="https://formspree.io/f/your-id-here" method="POST" class="contact-form">
        <div class="form-group">
            <label for="name">성함</label>
            <input type="text" id="name" name="name" placeholder="성함을 입력해 주세요" required>
        </div>
        <div class="form-group">
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
            <label for="message">문의 내용</label>
            <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 입력해 주세요" required></textarea>
        </div>
        <button type="submit" class="submit-btn">문의하기</button>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
